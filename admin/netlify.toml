[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/login.html"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/dashboard.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

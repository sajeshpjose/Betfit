<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members — Betfit Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles.css">
</head>
<body class="app-layout">

<div id="nav-container"></div>

<main class="page-content">
  <div class="page-header">
    <h1>Members</h1>
    <span style="font-size:12px; color:var(--text-muted);">Read-only — members join via the app</span>
  </div>

  <div class="filter-bar">
    <div class="search-input-wrapper">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search by name…" oninput="filterMembers()" style="width:280px;">
    </div>
  </div>

  <div class="table-wrapper">
    <div class="table-toolbar">
      <span class="table-title">All members <span class="table-count" id="count-label"></span></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Company</th>
          <th>Role</th>
          <th>Total Steps</th>
          <th>Joined</th>
        </tr>
      </thead>
      <tbody id="members-tbody">
        <tr class="loading-row"><td colspan="5"><span class="spinner"></span> Loading…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script src="/shared/config.js"></script>
<script src="/shared/auth.js"></script>
<script src="/shared/api.js"></script>
<script src="/shared/toast.js"></script>
<script src="/shared/nav.js"></script>
<script>
  checkAuth()
  renderNav('members')

  let allMembers = [], stepTotals = {}

  function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
  function formatDate(d) {
    if (!d) return '—'
    return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
  }
  function fmtNum(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n) }

  async function loadMembers() {
    try {
      const [profiles, logs] = await Promise.all([
        get('profiles?order=created_at.desc'),
        get('step_logs?select=user_id,step_count')
      ])

      // Sum all steps per user
      stepTotals = {}
      ;(logs||[]).forEach(l => { stepTotals[l.user_id] = (stepTotals[l.user_id]||0)+(l.step_count||0) })

      allMembers = (profiles || []).map(p => ({
        users: { name: p.display_name },
        companies: { name: p.company },
        role: 'member',
        user_id: p.id,
        joined_at: p.created_at
      }))
      document.getElementById('count-label').textContent = `(${allMembers.length})`
      renderTable(allMembers)
    } catch (err) {
      showToast('Failed to load members: ' + err.message, 'error')
    }
  }

  function renderTable(data) {
    const tbody = document.getElementById('members-tbody')

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><span class="empty-icon">👤</span><p>No members found</p></div></td></tr>`
      return
    }

    tbody.innerHTML = data.map(m => `
      <tr>
        <td><strong>${escHtml(m.users?.name || 'Unknown')}</strong></td>
        <td class="text-weak">${escHtml(m.companies?.name || '—')}</td>
        <td><span class="badge ${m.role==='admin'?'badge-active':'badge-upcoming'}">${m.role||'member'}</span></td>
        <td class="text-weak">${fmtNum(stepTotals[m.user_id]||0)}</td>
        <td class="text-weak">${formatDate(m.joined_at)}</td>
      </tr>
    `).join('')
  }

  function filterMembers() {
    const q = document.getElementById('search-input').value.toLowerCase()
    const filtered = q
      ? allMembers.filter(m => (m.users?.name||'').toLowerCase().includes(q))
      : allMembers
    document.getElementById('count-label').textContent = `(${filtered.length})`
    renderTable(filtered)
  }

  loadMembers()
</script>
</body>
</html>

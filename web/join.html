<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join BetFit Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
        }

        .card {
            background: #141414;
            border: 0.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 14px;
            color: #888888;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .invite-details {
            background: #0A0A0A;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
            text-align: left;
        }

        .detail-item {
            margin-bottom: 16px;
        }

        .detail-label {
            font-size: 11px;
            color: #444444;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 40px 0;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(213, 255, 69, 0.2);
            border-top-color: #D5FF45;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(255, 69, 58, 0.1);
            border: 0.5px solid #FF453A;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #FF453A;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 14px 24px;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: #D5FF45;
            color: #000000;
        }

        .btn-primary:hover {
            background: #E5FF75;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #1C1C1C;
            color: #FFFFFF;
            border: 0.5px solid rgba(255, 255, 255, 0.12);
        }

        .btn-secondary:hover {
            background: #252525;
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-disabled:hover {
            background: #D5FF45;
        }

        .footer-text {
            font-size: 12px;
            color: #444444;
            margin-top: 24px;
            line-height: 1.6;
        }

        .footer-text a {
            color: #D5FF45;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">👟</div>

            <h1>You're Invited!</h1>
            <p class="subtitle">Join a team challenge on BetFit</p>

            <div id="content">
                <div class="loading">
                    <div class="spinner"></div>
                    <span>Loading invite...</span>
                </div>
            </div>

            <div class="footer-text">
                Don't have BetFit yet? <a href="https://apps.apple.com/us/app/betfit/id6737249847" target="_blank">Download on App Store</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jdaqkumsyvijqqgudbjj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_QqaBpCWOr3z-rh7l7JZtDg_R_g-RHKn";

        async function loadInvite() {
            const pathParts = window.location.pathname.split('/');
            const teamId = pathParts[pathParts.length - 1];

            if (!teamId || teamId === 'join' || teamId === '') {
                showError('Invalid invitation link');
                return;
            }

            try {
                // Fetch team and challenge info
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/challenge_teams?id=eq.${teamId}&select=name,challenge_id,challenges(name,company)`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Accept': 'application/json'
                        }
                    }
                );

                if (!response.ok) throw new Error('Failed to load invite');

                const data = await response.json();
                if (!data || data.length === 0) {
                    showError('Invitation not found or has expired');
                    return;
                }

                const team = data[0];
                const challenge = team.challenges?.[0] || {};

                showInvite(team, challenge, teamId);
            } catch (error) {
                console.error('Error loading invite:', error);
                showError('Unable to load invitation. Please try again.');
            }
        }

        function showInvite(team, challenge, teamId) {
            const content = document.getElementById('content');
            const appLink = `betfit://join/${teamId}`;
            const appStoreLink = "https://apps.apple.com/us/app/betfit/id6737249847";

            content.innerHTML = `
                <div class="invite-details">
                    <div class="detail-item">
                        <div class="detail-label">Team</div>
                        <div class="detail-value">${escapeHtml(team.name)}</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Challenge</div>
                        <div class="detail-value">${escapeHtml(challenge.name || 'BetFit Challenge')}</div>
                    </div>
                    ${challenge.company ? `
                    <div class="detail-item">
                        <div class="detail-label">Organization</div>
                        <div class="detail-value">${escapeHtml(challenge.company)}</div>
                    </div>
                    ` : ''}
                </div>

                <div class="button-group">
                    <a href="${appLink}" onclick="return openApp('${appLink}', '${appStoreLink}')">
                        <button class="btn-primary">Open in BetFit</button>
                    </a>
                    <a href="${appStoreLink}" target="_blank">
                        <button class="btn-secondary">Download BetFit</button>
                    </a>
                </div>
            `;
        }

        function showError(message) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="error">${escapeHtml(message)}</div>
                <div class="button-group">
                    <a href="https://apps.apple.com/us/app/betfit/id6737249847" target="_blank">
                        <button class="btn-primary">Download BetFit</button>
                    </a>
                    <a href="/">
                        <button class="btn-secondary">Back to Home</button>
                    </a>
                </div>
            `;
        }

        function openApp(deepLink, fallbackUrl) {
            // Try to open the app via deeplink
            window.location.href = deepLink;

            // If app isn't installed, fall back to App Store after a short delay
            setTimeout(() => {
                window.location.href = fallbackUrl;
            }, 1500);

            return false;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load invite when page loads
        loadInvite();
    </script>
</body>
</html>
